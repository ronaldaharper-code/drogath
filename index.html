<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Drogath's Forge</title>
<style>

:root {
  --hs-left:    50%;
  --hs-top:     37%;
  --hs-width:   24%;
  --hs-height:  14%;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.scene {
  position: relative;
  width: 100vw;
  height: 100vh;

  background-image: url("0D36AF25-88AC-46EC-975D-4750ED364046.PNG");
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  background-color: black;
}

.anvil-hotspot {
  position: absolute;
  left:   var(--hs-left);
  top:    var(--hs-top);
  width:  var(--hs-width);
  height: var(--hs-height);

  transform: translate(-50%, -50%);
  border-radius: 20%;

  background: transparent;
  cursor: pointer;
  text-decoration: none;

  animation: forge-flicker 3s ease-in-out infinite;
}

.anvil-hotspot:hover {
  animation: forge-flicker-hot 0.9s ease-in-out infinite;
}

@keyframes forge-flicker {
  0%   { box-shadow: 0 0  6px  2px rgba(200,  50,  0, 0.20); }
  12%  { box-shadow: 0 0 14px  5px rgba(255, 100, 10, 0.50); }
  25%  { box-shadow: 0 0  8px  3px rgba(210,  60,  0, 0.25); }
  40%  { box-shadow: 0 0 18px  7px rgba(255, 140, 20, 0.60); }
  55%  { box-shadow: 0 0  9px  3px rgba(220,  70,  0, 0.28); }
  70%  { box-shadow: 0 0 16px  6px rgba(255, 120, 15, 0.52); }
  85%  { box-shadow: 0 0  7px  2px rgba(200,  50,  0, 0.20); }
  100% { box-shadow: 0 0  6px  2px rgba(200,  50,  0, 0.20); }
}

@keyframes forge-flicker-hot {
  0%   { box-shadow: 0 0 14px  6px rgba(255, 160, 30, 0.65); }
  20%  { box-shadow: 0 0 22px 10px rgba(255, 210, 80, 0.90); }
  40%  { box-shadow: 0 0 16px  7px rgba(255, 170, 40, 0.70); }
  60%  { box-shadow: 0 0 26px 12px rgba(255, 220, 90, 1.00); }
  80%  { box-shadow: 0 0 18px  8px rgba(255, 180, 50, 0.75); }
  100% { box-shadow: 0 0 14px  6px rgba(255, 160, 30, 0.65); }
}

.hint {
  position: absolute;
  bottom: 5%;
  left: 50%;
  transform: translateX(-50%);

  font-family: Georgia, 'Times New Roman', serif;
  font-size: clamp(0.75rem, 2vw, 1rem);
  letter-spacing: 0.08em;
  color: rgba(255, 220, 140, 0.85);
  text-shadow:
    0 1px 4px rgba(0, 0, 0, 0.8),
    0 0 12px rgba(200, 100, 0, 0.5);

  white-space: nowrap;
  pointer-events: none;

  animation: hint-fade 3s ease-in-out infinite;
}

@keyframes hint-fade {
  0%, 100% { opacity: 0.6; }
  50%       { opacity: 1.0; }
}

</style>
</head>
<body>

<div class="scene">

<a
class="anvil-hotspot"
href="https://www.tcgplayer.com/search/all/product?seller=169de1d6&view=grid"
target="_blank"
rel="noopener noreferrer"
aria-label="Enter Drogath's shop on TCGplayer"
></a>

<p class="hint">Tap or click the anvil to enter the shop</p>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drogath's Forge</title>

<style>
html,body{
background-color:black;
margin:0;
height:100%;
overflow:hidden;
}

body{
background-image:url("0D36AF25-88AC-46EC-975D-4750ED364046.PNG");
background-size:contain;
background-position:center;
background-repeat:no-repeat;
}

.anvil{
position:absolute;
left:50%;
top:50%;
width:140px;
height:140px;
transform:translate(-50%,-50%);
cursor:pointer;
border-radius:50%;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(255,150,20,.7);}
70%{box-shadow:0 0 0 30px rgba(255,150,20,0);}
100%{box-shadow:0 0 0 0 rgba(255,150,20,0);}
}
</style>

</head>

<body>

<a class="anvil"
href="https://www.tcgplayer.com/search/all/product?seller=169de1d6&view=grid"
target="_blank">
</a>

</body>
